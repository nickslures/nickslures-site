<!doctype html>
<html lang="en">
<head>
  <title>Add/Edit Product | Nick's Lures</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="../assets/css/base.css">
<link rel="stylesheet" href="../assets/css/admin.css">

</head>
<body data-admin-page>
  <div class="admin-layout">

<aside class="admin-sidebar">
  <h2>Nick's Lures Admin</h2>
  <nav>
    <a href="dashboard.html">Dashboard</a>
    <a href="products.html">Products</a>
    <a href="product-edit.html">Add Product</a>
    <a href="../index.html">View Site</a>
    <a href="#" data-logout>Log Out</a>
  </nav>
</aside>

    <main class="admin-main">
      <h1>Add/Edit Product</h1>
      <p class="notice">For now, enter an image path such as <code>assets/images/products/your-file.jpg</code>. A real upload button needs backend storage.</p>

      <form class="form-grid" data-product-form>
        <label>
          Product Name
          <input name="name" required>
        </label>

        <label>
          SKU
          <input name="sku">
        </label>

        <label>
          Price
          <input name="price" type="number" min="0" step="0.01" required>
        </label>

        <label>
          Short Description
          <input name="shortDescription">
        </label>

        <label>
          Full Description
          <textarea name="description"></textarea>
        </label>

        <label>
          Category
          <select name="category">
            <option value="">Choose category</option>
            <option value="jigs">Jigs</option>
            <option value="soft-plastics">Soft Plastics</option>
            <option value="hard-baits">Hard Baits</option>
            <option value="spinnerbaits">Spinnerbaits</option>
            <option value="custom">Custom Lures</option>
          </select>
        </label>

        <label>
          Product Image Path
          <input name="image" placeholder="assets/images/products/lure-name.jpg">
        </label>

        <label>
          Featured Product
          <select name="featured">
            <option value="false">No</option>
            <option value="true">Yes</option>
          </select>
        </label>

        <label>
          Publish Status
          <select name="status">
            <option value="draft">Draft</option>
            <option value="active">Active</option>
            <option value="archived">Archived</option>
          </select>
        </label>

        <label>
          Inventory Status
          <select name="inventoryStatus">
            <option value="in-stock">In Stock</option>
            <option value="low-stock">Low Stock</option>
            <option value="out-of-stock">Out of Stock</option>
            <option value="made-to-order">Made to Order</option>
          </select>
        </label>

        <div class="action-row">
          <button type="submit">Save Product</button>
          <a class="button secondary" href="products.html">Cancel</a>
        </div>
      </form>
    </main>
  </div>

  <script src="../assets/js/product-store.js"></script>
  <script src="../assets/js/admin-auth.js"></script>
  <script src="../assets/js/admin-products.js"></script>
</body>
</html>
